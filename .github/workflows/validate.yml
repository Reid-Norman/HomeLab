name: Validate

on: [push, pull_request, workflow_dispatch]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint yamllint
          pip install uptime-kuma-api
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: YAML Lint
        run: yamllint .

      - name: Ansible Lint
        run: ansible-lint ansible/site.yml

      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

      - name: Ansible Syntax Check
        env:
          VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
        run: |
          if [ -z "$VAULT_PASSWORD" ]; then
            echo "VAULT_PASSWORD secret not set — skipping syntax check"
            exit 0
          fi
          echo "$VAULT_PASSWORD" > /tmp/vault-pass
          ansible-playbook --syntax-check -i ansible/inventory/hosts.yml ansible/site.yml --vault-password-file /tmp/vault-pass
          rm -f /tmp/vault-pass

      - name: Secrets Scan
        uses: zricethezav/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_COMMENTS: false
