- name: Configure Radarr via API
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Ensure Radarr is reachable
      uri:
        url: "http://localhost:7878/api/v3/system/status"
        method: GET
        status_code: 200
      register: radarr_status
      ignore_errors: true

    - name: Configure Radarr - placeholder
      debug:
        msg: "Radarr API key would be used from vault: {{ radarr_api_key }}"
