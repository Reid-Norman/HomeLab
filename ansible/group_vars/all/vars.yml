# Non-secret variables used by playbooks
docker_compose_root: "{{ playbook_dir }}/.."
media_stack_path: "{{ docker_compose_root }}/docker-media-stack"
management_stack_path: "{{ docker_compose_root }}/docker-management-stack"
networking_stack_path: "{{ docker_compose_root }}/docker-networking-stack"
automation_stack_path: "{{ docker_compose_root }}/docker-automation-stack"

# Networking
server_lan_ip: "{{ vault_server_ip }}"

# Static container IPs (must match docker-compose.yml assignments)
sonarr_static_ip: "172.20.0.201"
radarr_static_ip: "172.20.0.200"

# Prowlarr URL (accessed from within VPN namespace)
prowlarr_url: "http://vpn:9696"

# AdGuard DNS rewrites (wildcard covers all subdomains)
adguard_dns_rewrites:
  - domain: "*.{{ vault_domain }}"
    answer: "{{ server_lan_ip }}"

# qBittorrent preferences
qbittorrent_download_path: "/downloads"
qbittorrent_max_seeding_time: 14400  # 10 days in minutes

qbittorrent_categories:
  - name: "tv-sonarr"
    savePath: "/downloads/tvshows"
  - name: "radarr"
    savePath: "/downloads/movies"
  - name: "audiobooks"
    savePath: "/downloads/audiobooks"

# Sonarr root folders
sonarr_root_folders:
  - path: "/downloads/tvshows"
  - path: "/downloads/anime"

# Radarr root folders
radarr_root_folders:
  - path: "/downloads/movies"

# Prowlarr application sync targets
prowlarr_applications:
  - name: "Sonarr"
    implementation: "Sonarr"
    baseUrl: "http://{{ sonarr_static_ip }}:8989"
    apiKey: "{{ sonarr_api_key }}"
  - name: "Radarr"
    implementation: "Radarr"
    baseUrl: "http://{{ radarr_static_ip }}:7878"
    apiKey: "{{ radarr_api_key }}"

# Jellyfin plugin repositories (third-party repos to add)
jellyfin_plugin_repos:
  - Name: "Intro Skipper"
    Url: "https://raw.githubusercontent.com/intro-skipper/intro-skipper/master/manifest.json"
    Enabled: true

# Jellyfin plugins to install
jellyfin_plugins:
  - name: "Intro Skipper"
  - name: "Fanart"

# Cloudflare Tunnel subdomains (CNAME records pointing to tunnel)
cloudflare_tunnel_subdomains:
  - jellyfin
  - sonarr
  - radarr
  - prowlarr
  - qbittorrent
  - jellyseerr
  - audiobookshelf
  - shelfmark
  - recommendarr
  - portainer
  - uptime-kuma
  - dozzle
  - semaphore
  - traefik

# Cloudflare Access allowed emails
cloudflare_access_allowed_emails:
  - "{{ vault_le_email }}"

# Uptime Kuma Telegram notifications
uptime_kuma_telegram_enabled: true

# Semaphore project configuration
semaphore_project_name: "HomeLab"
semaphore_repo_url: "https://github.com/Reid-Norman/HomeLab.git"

# Uptime Kuma monitors (use container names for internal Docker network resolution)
# VPN-namespaced services (qBittorrent, Prowlarr) use "vpn" as hostname
uptime_kuma_monitors:
  - name: "Jellyfin"
    type: http
    url: "http://jellyfin:8096"
  - name: "Sonarr"
    type: http
    url: "http://sonarr:8989"
  - name: "Radarr"
    type: http
    url: "http://radarr:7878"
  - name: "Prowlarr"
    type: http
    url: "http://vpn:9696"
  - name: "qBittorrent"
    type: http
    url: "http://vpn:5080"
  - name: "Jellyseerr"
    type: http
    url: "http://jellyseerr:5055"
  - name: "AdGuard Home"
    type: http
    url: "http://adguardhome:80"
  - name: "Traefik"
    type: http
    url: "http://traefik:80"
    maxretries: 1
  - name: "Portainer"
    type: http
    url: "http://portainer:9000"
  - name: "Semaphore"
    type: http
    url: "http://semaphore:3000/api/ping"
  - name: "Dozzle"
    type: http
    url: "http://dozzle:8080"
  - name: "Audiobookshelf"
    type: http
    url: "http://audiobookshelf:80"
  - name: "Shelfmark"
    type: http
    url: "http://shelfmark:8084"
